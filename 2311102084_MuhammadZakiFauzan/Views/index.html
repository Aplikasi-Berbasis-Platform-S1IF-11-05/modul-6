<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventori Pak Cik & Aimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">
            <i class='bx bxs-store-alt me-2'></i>Toko Pak Cik & Aimar
        </a>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h4 class="fw-bold mb-0">Dashboard Stok Barang</h4>
            <p class="text-muted small">Kelola ketersediaan produk harian</p>
        </div>
        <div class="col-auto">
            <button class="btn btn-primary d-flex align-items-center" id="btnTambah" data-bs-toggle="modal" data-bs-target="#formModal">
                <i class='bx bx-plus me-2'></i> Tambah Produk
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Nama Produk</th>
                            <th>Harga</th>
                            <th>Stok</th>
                            <th class="text-center">Opsi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelProduk"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header">
                <h5 class="fw-bold mb-0" id="modalTitle">Form Produk</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="produkForm">
                <div class="modal-body">
                    <input type="hidden" id="idProduk">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Barang</label>
                        <input type="text" id="nama" class="form-control" placeholder="Nama produk..." required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Harga</label>
                            <input type="number" id="harga" class="form-control" placeholder="Rp" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Stok</label>
                            <input type="number" id="stok" class="form-control" placeholder="Qty" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-primary px-4">Simpan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-body text-center py-4">
                <i class='bx bx-trash text-danger mb-2' style="font-size: 3rem;"></i>
                <h6 class="fw-bold">Hapus data ini?</h6>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button class="btn btn-light btn-sm" data-bs-dismiss="modal">Batal</button>
                    <button class="btn btn-danger btn-sm px-3" id="btnKonfirmasiHapus">Hapus</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/script.js"></script>
</body>
</html>
