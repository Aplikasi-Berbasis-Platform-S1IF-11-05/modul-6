<!DOCTYPE html>
<html>
<head>
  <title>Toko Kelontong</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2>🛒 Toko Pak Cik & Aimar</h2>

  <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#formModal">
    + Tambah
  </button>

  <table class="table">
    <thead>
      <tr>
        <th>Nama</th>
        <th>Harga</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal fade" id="formModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-body">
        <input id="id" type="hidden">
        <input id="name" class="form-control mb-2" placeholder="Nama">
        <input id="price" class="form-control" placeholder="Harga">
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="save()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
