<!DOCTYPE html>
<html>
<head>
  <title>Toko Pak Cik</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      border-radius: 10px;
    }

    table tbody tr:hover {
      background: #f1f1f1;
      transition: 0.3s;
    }
  </style>
</head>

<body class="container mt-5">

<div class="card p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>🛒 Inventori Toko Pak Cik</h3>
    <button class="btn btn-primary" onclick="openAddModal()">+ Tambah Produk</button>
  </div>

  <table class="table table-striped text-center">
    <thead class="table-dark">
      <tr>
        <th>Nama</th>
        <th>Harga</th>
        <th>Stock</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Modal Form -->
<div class="modal fade" id="formModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5 id="modalTitle">Tambah Produk</h5>

      <input type="hidden" id="productId">

      <input type="text" id="name" class="form-control mb-2" placeholder="Nama Produk">
      <input type="number" id="price" class="form-control mb-2" placeholder="Harga">
      <input type="number" id="stock" class="form-control mb-2" placeholder="Stock">

      <button class="btn btn-success mt-2" onclick="saveProduct()">Simpan</button>
    </div>
  </div>
</div>

<!-- Modal Delete -->
<div class="modal fade" id="deleteModal">
  <div class="modal-dialog">
    <div class="modal-content p-3 text-center">
      <h5>Yakin ingin hapus produk ini?</h5>
      <button class="btn btn-danger mt-2" id="confirmDelete">Hapus</button>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
