<!DOCTYPE html>
<html>
<head>
    <title>Tambah Produk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2>Tambah Produk</h2>

<form id="formCreate">
    <input class="form-control mb-2" name="nama" placeholder="Nama" required>
    <input class="form-control mb-2" name="harga" placeholder="Harga" required>
    <input class="form-control mb-2" name="stok" placeholder="Stok" required>

    <button class="btn btn-success">Simpan</button>
</form>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$('#formCreate').submit(function(e){
    e.preventDefault();

    let data = {
        nama: $('[name=nama]').val(),
        harga: $('[name=harga]').val(),
        stok: $('[name=stok]').val()
    };

    $.ajax({
        url: '/api/products',
        type: 'POST',
        data: JSON.stringify(data),
        contentType: 'application/json',
        success: function(){
            alert('Berhasil tambah');
            window.location.href = '/';
        },
        error: function(err){
            console.log(err);
            alert('Gagal tambah');
        }
    });
});
</script>

</body>
</html>
