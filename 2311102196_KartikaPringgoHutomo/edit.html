<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Produk</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="text-center mb-4">Edit Produk</h3>

            <form id="formEdit">
                <input type="hidden" id="id">
                <input class="form-control mb-3" id="nama" placeholder="Nama Produk">
                <input class="form-control mb-3" id="harga" placeholder="Harga">
                <input class="form-control mb-3" id="stok" placeholder="Stok">

                <div class="d-grid">
                    <button class="btn btn-warning">Update</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = parseInt(urlParams.get('id'));

$.get('/api/products', function(data){
    let item = data.find(i => i.id === id);

    if (!item) {
        alert('Data tidak ditemukan!');
        window.location.href = 'index.html';
        return;
    }

    $('#nama').val(item.nama);
    $('#harga').val(item.harga);
    $('#stok').val(item.stok);
});

$('#formEdit').submit(function(e){
    e.preventDefault();

    $.ajax({
        url: '/api/products/' + id,
        type: 'PUT',
        data: JSON.stringify({
            nama: $('#nama').val(),
            harga: $('#harga').val(),
            stok: $('#stok').val()
        }),
        contentType: 'application/json',
        success: function(){
            alert('Berhasil update');
            window.location.href = 'index.html';
        }
    });
});
</script>

</body>
</html>
