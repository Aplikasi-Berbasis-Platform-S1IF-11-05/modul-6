<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Produk - Toko Kelontong</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: 12px; }
        .form-control:focus { border-color: #ffc107; box-shadow: 0 0 0 0.2rem rgba(255,193,7,.2); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a href="index.html" class="navbar-brand">🛒 Toko Kelontong</a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 520px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Data Produk</a></li>
            <li class="breadcrumb-item active">Edit Produk</li>
        </ol>
    </nav>

    <!-- Alert -->
    <div id="alertBox" class="alert d-none" role="alert"></div>

    <!-- Loading skeleton -->
    <div id="loadingCard" class="card shadow-sm p-4 text-center">
        <div class="spinner-border text-warning mx-auto" role="status"></div>
        <p class="mt-2 text-muted">Memuat data produk...</p>
    </div>

    <div id="editCard" class="card shadow-sm d-none">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold text-warning">✏️ Edit Produk</h5>
        </div>
        <div class="card-body p-4">
            <input type="hidden" id="id">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nama Produk <span class="text-danger">*</span></label>
                <input type="text" id="nama" class="form-control" placeholder="Nama Produk" required>
                <div class="invalid-feedback">Nama produk wajib diisi.</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Harga (Rp) <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text">Rp</span>
                    <input type="number" id="harga" class="form-control" placeholder="Harga" min="0" required>
                </div>
                <div class="invalid-feedback">Harga wajib diisi.</div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Stok <span class="text-danger">*</span></label>
                <input type="number" id="stok" class="form-control" placeholder="Stok" min="0" required>
                <div class="invalid-feedback">Stok wajib diisi.</div>
            </div>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-secondary flex-fill">Batal</a>
                <button id="btnUpdate" class="btn btn-warning flex-fill text-dark fw-semibold">
                    <span id="updateSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
                    🔄 Update
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id'));

    function showAlert(type, msg) {
        const box = $('#alertBox');
        box.removeClass('d-none alert-success alert-danger alert-warning').addClass(`alert-${type}`).text(msg);
        if (type !== 'success') setTimeout(() => box.addClass('d-none'), 4000);
    }

    // Redirect jika tidak ada ID
    if (!id || isNaN(id)) {
        alert('ID produk tidak valid!');
        window.location.href = 'index.html';
    }

    // Ambil data produk by ID
    $.ajax({
        url: '/api/products/' + id,
        type: 'GET',
        success: function(item) {
            $('#id').val(item.id);
            $('#nama').val(item.nama);
            $('#harga').val(item.harga);
            $('#stok').val(item.stok);
            $('#loadingCard').addClass('d-none');
            $('#editCard').removeClass('d-none');
        },
        error: function(xhr) {
            const msg = xhr.responseJSON?.message || 'Produk tidak ditemukan!';
            showAlert('danger', msg);
            setTimeout(() => window.location.href = 'index.html', 2000);
        }
    });

    function validateForm() {
        const nama = $('#nama').val().trim();
        const harga = $('#harga').val();
        const stok = $('#stok').val();

        $('#nama').toggleClass('is-invalid', !nama);
        $('#harga').toggleClass('is-invalid', !harga || isNaN(harga) || parseFloat(harga) < 0);
        $('#stok').toggleClass('is-invalid', !stok || isNaN(stok) || parseInt(stok) < 0);

        return nama && harga && stok;
    }

    $('#btnUpdate').click(function() {
        if (!validateForm()) return;

        const data = {
            nama: $('#nama').val().trim(),
            harga: parseFloat($('#harga').val()),
            stok: parseInt($('#stok').val())
        };

        $('#updateSpinner').removeClass('d-none');
        $('#btnUpdate').prop('disabled', true);

        $.ajax({
            url: '/api/products/' + id,
            type: 'PUT',
            data: JSON.stringify(data),
            contentType: 'application/json',
            success: function(res) {
                showAlert('success', '✅ ' + (res.message || 'Produk berhasil diupdate!'));
                setTimeout(() => window.location.href = 'index.html', 1200);
            },
            error: function(xhr) {
                const msg = xhr.responseJSON?.message || 'Gagal mengupdate produk.';
                showAlert('danger', '❌ ' + msg);
            },
            complete: function() {
                $('#updateSpinner').addClass('d-none');
                $('#btnUpdate').prop('disabled', false);
            }
        });
    });

    // Real-time validation clear
    $('#nama, #harga, #stok').on('input', function() {
        $(this).removeClass('is-invalid');
    });
</script>
</body>
</html>
