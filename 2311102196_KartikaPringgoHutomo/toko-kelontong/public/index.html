<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Kelontong - Data Produk</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <style>
        body { background: #f0f2f5; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { border: none; border-radius: 12px; }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .btn-sm { border-radius: 6px; }
        .badge-stok { font-size: 0.85rem; }
        #loadingSpinner { display: none; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand">🛒 Toko Kelontong</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- Alert -->
    <div id="alertBox" class="alert d-none" role="alert"></div>

    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0 fw-bold text-primary">📦 Data Produk</h5>
            <a href="create.html" class="btn btn-primary btn-sm px-3">
                <i>＋</i> Tambah Produk
            </a>
        </div>
        <div class="card-body">
            <div id="loadingSpinner" class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Memuat data...</p>
            </div>
            <table id="table" class="table table-striped table-hover align-middle w-100">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nama Produk</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
            <div class="mb-3" style="font-size:3rem">🗑️</div>
            <h5 class="fw-bold">Hapus Produk?</h5>
            <p class="text-muted mb-0">Data <strong id="deleteProductName"></strong> akan dihapus permanen dan tidak bisa dikembalikan.</p>
            <div class="mt-4 d-flex gap-2 justify-content-center">
                <button class="btn btn-secondary px-4" data-bs-dismiss="modal">Batal</button>
                <button id="confirmDelete" class="btn btn-danger px-4">
                    <span id="deleteSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
                    Hapus
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selectedId = null;
    let dataTable = null;

    // Format Rupiah
    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    }

    // Tampilkan alert
    function showAlert(type, msg) {
        const box = $('#alertBox');
        box.removeClass('d-none alert-success alert-danger').addClass(`alert-${type}`).text(msg);
        setTimeout(() => box.addClass('d-none'), 3000);
    }

    // Load data produk
    function loadData() {
        $('#loadingSpinner').show();
        if (dataTable) { dataTable.destroy(); $('#table tbody').empty(); }

        $.ajax({
            url: '/api/products',
            type: 'GET',
            success: function(data) {
                let rows = '';
                if (data.length === 0) {
                    rows = '<tr><td colspan="5" class="text-center text-muted py-4">Belum ada produk. <a href="create.html">Tambah sekarang</a></td></tr>';
                } else {
                    data.forEach((item, i) => {
                        const stokBadge = item.stok <= 5
                            ? `<span class="badge bg-danger">${item.stok}</span>`
                            : item.stok <= 20
                                ? `<span class="badge bg-warning text-dark">${item.stok}</span>`
                                : `<span class="badge bg-success">${item.stok}</span>`;
                        rows += `
                            <tr>
                                <td class="text-muted">${i + 1}</td>
                                <td><strong>${item.nama}</strong></td>
                                <td>${formatRupiah(item.harga)}</td>
                                <td>${stokBadge}</td>
                                <td class="text-center">
                                    <a href="edit.html?id=${item.id}" class="btn btn-sm btn-warning me-1">✏️ Edit</a>
                                    <button class="btn btn-sm btn-danger btn-delete" data-id="${item.id}" data-nama="${item.nama}">🗑️ Hapus</button>
                                </td>
                            </tr>`;
                    });
                }
                $('#table tbody').html(rows);
                dataTable = $('#table').DataTable({
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/id.json'
                    },
                    columnDefs: [{ orderable: false, targets: 4 }]
                });
            },
            error: function() {
                showAlert('danger', 'Gagal memuat data produk. Pastikan server berjalan.');
            },
            complete: function() {
                $('#loadingSpinner').hide();
            }
        });
    }

    loadData();

    // Klik tombol Hapus
    $(document).on('click', '.btn-delete', function() {
        selectedId = $(this).data('id');
        const nama = $(this).data('nama');
        $('#deleteProductName').text(nama);
        new bootstrap.Modal('#deleteModal').show();
    });

    // Konfirmasi Hapus
    $('#confirmDelete').click(function() {
        if (!selectedId) return;
        $('#deleteSpinner').removeClass('d-none');
        $('#confirmDelete').prop('disabled', true);

        $.ajax({
            url: '/api/products/' + selectedId,
            type: 'DELETE',
            success: function(res) {
                $('#deleteModal').modal('hide');
                showAlert('success', res.message || 'Produk berhasil dihapus');
                loadData();
            },
            error: function() {
                showAlert('danger', 'Gagal menghapus produk.');
            },
            complete: function() {
                $('#deleteSpinner').addClass('d-none');
                $('#confirmDelete').prop('disabled', false);
                selectedId = null;
            }
        });
    });
</script>
</body>
</html>
