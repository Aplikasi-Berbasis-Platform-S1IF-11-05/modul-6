<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Toko Kelontong</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Data Produk</h3>
        <a href="create.html" class="btn btn-primary">+ Tambah</a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table id="table" class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nama</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Delete -->
<div class="modal fade" id="deleteModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
        <h5>Yakin hapus data ini?</h5>
        <p class="text-muted">Tidak bisa dikembalikan</p>

        <div class="mt-3">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button id="confirmDelete" class="btn btn-danger">Hapus</button>
        </div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
let selectedId = null;

// LOAD DATA
function loadData() {
    $.get('/api/products', function(data) {
        let rows = '';
        data.forEach(item => {
            rows += `
                <tr>
                    <td>${item.nama}</td>
                    <td>Rp ${item.harga}</td>
                    <td>${item.stok}</td>
                    <td>
                        <a href="edit.html?id=${item.id}" class="btn btn-sm btn-warning">Edit</a>
                        <button class="btn btn-sm btn-danger btn-delete" data-id="${item.id}">Hapus</button>
                    </td>
                </tr>
            `;
        });

        $('#table tbody').html(rows);
        $('#table').DataTable();
    });
}

loadData();

// DELETE BUTTON
$(document).on('click', '.btn-delete', function(){
    selectedId = $(this).data('id');
    new bootstrap.Modal('#deleteModal').show();
});

// CONFIRM DELETE
$('#confirmDelete').click(function(){
    $.ajax({
        url: '/api/products/' + selectedId,
        type: 'DELETE',
        success: function(){
            location.reload();
        }
    });
});
</script>

</body>
</html>
