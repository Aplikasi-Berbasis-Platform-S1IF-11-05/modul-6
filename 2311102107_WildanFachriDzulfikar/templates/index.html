<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventori Toko - Pak Cik & Aimar</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-dark mb-4 py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-box-seam me-2 fs-3 text-primary"></i>
                <span class="brand-text fs-4">TOKO PAK CIK & AIMAR</span>
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1 fw-bold">Daftar Inventori Produk</h1>
                <p class="text-muted small">Kelola stok barang dagangan dengan mudah dan cepat.</p>
            </div>
            <button id="addBtn" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAddProduct">
                <i class="bi bi-plus-lg me-2"></i>Tambah Produk
            </button>
        </header>

        <div class="card overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="productTable">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nama Produk</th>
                            <th>Kategori</th>
                            <th>Stok</th>
                            <th>Harga</th>
                            <th class="text-center pe-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <!-- Data akan diisi oleh jQuery -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Tambah Produk -->
    <div class="modal fade" id="modalAddProduct" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Tambah Produk Baru</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="formAddProduct">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="addName" class="form-label small text-muted text-uppercase fw-semibold">Nama Produk</label>
                            <input type="text" class="form-control" id="addName" required placeholder="Contoh: Beras Premium 5kg">
                        </div>
                        <div class="mb-3">
                            <label for="addCategory" class="form-label small text-muted text-uppercase fw-semibold">Kategori</label>
                            <select class="form-select" id="addCategory" required>
                                <option value="" selected disabled>Pilih Kategori</option>
                                <option value="Sembako">Sembako</option>
                                <option value="Minuman">Minuman</option>
                                <option value="Snack">Snack</option>
                                <option value="Kebutuhan Rumah">Kebutuhan Rumah</option>
                                <option value="Bumbu Dapur">Bumbu Dapur</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="addStock" class="form-label small text-muted text-uppercase fw-semibold">Stok</label>
                                <input type="number" class="form-control" id="addStock" required placeholder="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="addPrice" class="form-label small text-muted text-uppercase fw-semibold">Harga (Rp)</label>
                                <input type="number" class="form-control" id="addPrice" required placeholder="0">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-dark" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary">Simpan Produk</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Edit Produk -->
    <div class="modal fade" id="modalEditProduct" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit Produk</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="formEditProduct">
                    <input type="hidden" id="editId">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="editName" class="form-label small text-muted text-uppercase fw-semibold">Nama Produk</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editCategory" class="form-label small text-muted text-uppercase fw-semibold">Kategori</label>
                            <select class="form-select" id="editCategory" required>
                                <option value="Sembako">Sembako</option>
                                <option value="Minuman">Minuman</option>
                                <option value="Snack">Snack</option>
                                <option value="Kebutuhan Rumah">Kebutuhan Rumah</option>
                                <option value="Bumbu Dapur">Bumbu Dapur</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editStock" class="form-label small text-muted text-uppercase fw-semibold">Stok</label>
                                <input type="number" class="form-control" id="editStock" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editPrice" class="form-label small text-muted text-uppercase fw-semibold">Harga (Rp)</label>
                                <input type="number" class="form-control" id="editPrice" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-dark" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Hapus -->
    <div class="modal fade" id="modalDeleteConfirm" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-danger">
                <div class="modal-header bg-danger bg-opacity-10 border-danger text-danger">
                    <h5 class="modal-title fw-bold">Konfirmasi Hapus</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Apakah Anda yakin ingin menghapus produk <strong id="deleteProductName"></strong>? Tindakan ini tidak dapat dibatalkan.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-dark" data-bs-dismiss="modal">Batal</button>
                    <button type="button" id="confirmDeleteBtn" class="btn btn-danger">Hapus Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery and Bootstrap 5 JS Bundle -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
