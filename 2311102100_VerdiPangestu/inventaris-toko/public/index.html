<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Inventaris Toko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-3">
        <h2>📦 Toko Pak Cik & Mas Aimar</h2>
        <button class="btn btn-primary" id="btnTambahData">Tambah Produk</button>
    </div>

    <div class="card shadow-sm"><div class="card-body">
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr><th>Nama</th><th>Kategori</th><th>Stok</th><th>Harga</th><th>Aksi</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div></div>
</div>

<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Form Produk</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
        <form id="productForm">
            <input type="hidden" id="productId">
            <input type="text" class="form-control mb-2" id="nama" placeholder="Nama" required>
            <input type="text" class="form-control mb-2" id="kategori" placeholder="Kategori" required>
            <input type="number" class="form-control mb-2" id="stok" placeholder="Stok" required>
            <input type="number" class="form-control mb-2" id="harga" placeholder="Harga" required>
        </form>
        </div>
        <div class="modal-footer">
        <button type="button" class="btn btn-success" id="btnSimpan">Simpan</button>
        </div>
    </div></div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-danger text-white"><h5 class="modal-title">Hapus?</h5></div>
        <div class="modal-body">Yakin hapus data ini? <input type="hidden" id="deleteId"></div>
        <div class="modal-footer"><button type="button" class="btn btn-danger" id="btnKonfirmasiHapus">Hapus</button></div>
    </div></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
