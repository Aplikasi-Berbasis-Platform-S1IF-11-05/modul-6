<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Toko Kelontong Pak Cik</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="page-wrapper">
    <div class="inv-card">
        <!-- Header -->
        <div class="inv-header">
            <div>
                <h3>Inventaris Toko Pak Cik &amp; Mas Aimar</h3>
                <small>Kelola stok dan harga produk</small>
            </div>
            <button class="btn-add" data-bs-toggle="modal" data-bs-target="#productModal" id="addBtn">
                + Tambah Produk
            </button>
        </div>

        <!-- Tabel Produk -->
        <div style="overflow-x: auto;">
            <table class="inv-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama Produk</th>
                        <th>Stok</th>
                        <th>Harga</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
            <!-- Empty state -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M20.25 7.5l-.625 10.632A2.25 2.25 0 0117.378 20H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5
                             M10 11.25h4
                             M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5
                             c0-.621-.504-1.125-1.125-1.125H3.375
                             c-.621 0-1.125.504-1.125 1.125v1.5
                             c0 .621.504 1.125 1.125 1.125z"/>
                </svg>
                <p>Belum ada produk. Klik <strong>+ Tambah Produk</strong> untuk mulai.</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal Tambah / Edit Produk -->
<div class="modal fade" id="productModal" tabindex="-1"
     aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Tambah Produk</h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal" aria-label="Tutup"></button>
            </div>
            <form id="productForm">
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label class="form-label">Nama Produk</label>
                        <input type="text" id="name"
                               class="form-control"
                               placeholder="Contoh: Indomie Goreng" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stok</label>
                        <input type="number" id="stock"
                               class="form-control"
                               placeholder="0" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Harga (Rp)</label>
                        <input type="number" id="price"
                               class="form-control"
                               placeholder="0" min="0" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel"
                            data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn-save">Simpan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Konfirmasi Hapus -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Konfirmasi Hapus</h5>
            </div>
            <div class="modal-body" style="font-size:.875rem; color:var(--muted);">
                Yakin ingin menghapus produk ini? Tindakan ini tidak dapat dibatalkan.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel"
                        data-bs-dismiss="modal">Batal</button>
                <button type="button" id="confirmDelete" class="btn-danger-confirm">Hapus</button>
            </div>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="/static/js/main.js"></script>

</body>
</html>
