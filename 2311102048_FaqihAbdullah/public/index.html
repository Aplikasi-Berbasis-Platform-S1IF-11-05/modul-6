<!DOCTYPE html>
<html>
<head>
  <title>Inventory Toko</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">
  <h2>📦 Inventory Toko Pak Cik & Aimar</h2>

  <!-- FORM TAMBAH -->
  <form id="formTambah">
    <input type="text" id="nama" placeholder="Nama Produk" class="form-control mb-2" required>
    <input type="number" id="stok" placeholder="Stok" class="form-control mb-2" required>
    <button class="btn btn-primary">Tambah</button>
  </form>

  <!-- TABLE -->
  <table class="table mt-4">
    <thead>
      <tr>
        <th>Nama</th>
        <th>Stok</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="editModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Edit Produk</h5>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editId">
        <input type="text" id="editNama" class="form-control mb-2">
        <input type="number" id="editStok" class="form-control">
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" id="btnUpdate">Update</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
      </div>

    </div>
  </div>
</div>

<!-- MODAL DELETE -->
<div class="modal fade" id="deleteModal">
  <div class="modal-dialog">
    <div class="modal-content text-center p-3">

      <h5>Yakin mau hapus?</h5>
      <button class="btn btn-danger mt-2" id="confirmDelete">Hapus</button>
      <button class="btn btn-secondary mt-2" data-bs-dismiss="modal">Batal</button>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
