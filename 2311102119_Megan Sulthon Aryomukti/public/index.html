<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Toko Pak Cik & Aimar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

    <div class="container py-5">
        <h2 class="text-center mb-4">🛒 Inventaris Toko Kelontong</h2>

        <button class="btn btn-success mb-3" id="btnAdd">+ Tambah Produk</button>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Harga</th>
                    <th>Stok</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="productTable"></tbody>
        </table>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="formModal">
        <div class="modal-dialog">
            <div class="modal-content bg-secondary text-light">

                <div class="modal-header">
                    <h5 class="modal-title">Form Produk</h5>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="id">
                    <input class="form-control mb-2" id="nama" placeholder="Nama Produk">
                    <input class="form-control mb-2" id="harga" placeholder="Harga">
                    <input class="form-control mb-2" id="stok" placeholder="Stok">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" id="saveBtn">Simpan</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Delete -->
    <div class="modal fade" id="deleteModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-danger text-light text-center p-4">
                <h4>Yakin hapus produk?</h4>
                <button class="btn btn-light mt-3" id="confirmDelete">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        let selectedId = null;

        // Load data
        function loadData() {
            $.get('/products', function (data) {
                let html = '';
                data.forEach(item => {
                    html += `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.harga}</td>
                    <td>${item.stok}</td>
                    <td>
                        <button class="btn btn-warning btn-sm edit" data='${JSON.stringify(item)}'>Edit</button>
                        <button class="btn btn-danger btn-sm delete" data-id="${item.id}">Hapus</button>
                    </td>
                </tr>
            `;
                });
                $('#productTable').html(html);
            });
        }

        loadData();

        // Tambah
        $('#btnAdd').click(() => {
            $('#id').val('');
            $('#nama, #harga, #stok').val('');
            $('#formModal').modal('show');
        });

        // Simpan
        $('#saveBtn').click(() => {
            const data = {
                nama: $('#nama').val(),
                harga: $('#harga').val(),
                stok: $('#stok').val()
            };

            const id = $('#id').val();

            if (id) {
                $.ajax({
                    url: '/products/' + id,
                    method: 'PUT',
                    data: JSON.stringify(data),
                    contentType: 'application/json',
                    success: loadData
                });
            } else {
                $.ajax({
                    url: '/products',
                    method: 'POST',
                    data: JSON.stringify(data),
                    contentType: 'application/json',
                    success: loadData
                });
            }

            $('#formModal').modal('hide');
        });

        // Edit
        $(document).on('click', '.edit', function () {
            const data = $(this).attr('data');
            const item = JSON.parse(data);

            $('#id').val(item.id);
            $('#nama').val(item.nama);
            $('#harga').val(item.harga);
            $('#stok').val(item.stok);

            $('#formModal').modal('show');
        });

        // Delete
        $(document).on('click', '.delete', function () {
            selectedId = $(this).data('id');
            $('#deleteModal').modal('show');
        });

        // Confirm Delete
        $('#confirmDelete').click(() => {
            $.ajax({
                url: '/products/' + selectedId,
                method: 'DELETE',
                success: loadData
            });
            $('#deleteModal').modal('hide');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
