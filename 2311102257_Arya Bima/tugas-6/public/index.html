<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Inventori Pak Cik & Mas Aimar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h2 class="mb-4">Inventori Toko</h2>

      <button class="btn btn-primary mb-3" id="addBtn">Tambah Produk</button>

      <input
        type="text"
        id="search"
        class="form-control mb-3"
        placeholder="Search..."
      />

      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>Nama</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="productTable"></tbody>
      </table>
    </div>

    <!-- MODAL FORM -->
    <div class="modal fade" id="productModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Produk</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="id" />
            <input
              type="text"
              id="name"
              class="form-control mb-2"
              placeholder="Nama"
            />
            <input
              type="number"
              id="price"
              class="form-control mb-2"
              placeholder="Harga"
            />
            <input
              type="number"
              id="stock"
              class="form-control mb-2"
              placeholder="Stok"
            />
          </div>

          <div class="modal-footer">
            <button class="btn btn-success" id="saveBtn">Simpan</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL DELETE -->
    <div class="modal fade" id="deleteModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-body">Yakin mau hapus?</div>
          <div class="modal-footer">
            <button class="btn btn-danger" id="confirmDelete">Hapus</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
